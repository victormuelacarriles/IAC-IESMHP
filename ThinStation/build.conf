######################################
### --- Build Control Settings --- ###
######################################
param desktop        file:./backgrounds/Hive_Lite.jpg # Imagen de fondo de escritorio

param grubtheme      "default"

param tsuser         tsuser
param tsuserpasswd   tsuser      # CAMBIAR antes de cualquier despliegue real
param rootpasswd     root        # CAMBIAR antes de cualquier despliegue real
#param xorgvncpasswd  pleasechangeme     # VNC Access Password
#param storagepasswd  pleasechangeme     # Password for storage server
#param sambapasswd    pleasechangeme     # Password for samba shares (user mode security)

param defaultconfig  thinstation.conf.buildtime
param baseurl        https://www.thinstation.net
param basename       thinstation         # Used for all config/tftp/scp file names
param basepath       ts7.2               # Used to determine path to tftp/scp files
#param keyfile        ./id_rsa           # Private key file used for ssh/scp
#param knownhosts     ./known_hosts      # ssh known_hosts file for ssh/scp

#param localpkgs      false              # Determine if PKG files are to be loaded locally
param hardlinkfs     true                # Hardlink duplicate files to save space
param sametimestmp   true                # Set all timestamps to 00:00 of today
#param stripelf       yes                # Strip info from elf binaries (Maybe not Safe)

param haltonerror    false
param bootverbosity  3                   # Nivel de logging al arrancar TS

param fastboot       lotsofmem           # 'lotsofmem' para equipos modernos
param squashopt      "-comp xz"          # Settings para mksquashfs en fastboot
param initrdcmd      "xz"                # Compresion del initrd

# Kernel command-line options
param bootlogo       true                # Splash de arranque
#param bootresolution 2560x1440          # Forzar resolucion detectada por el kernel
#param acpisupport    disable            # No cargar modulos acpi (rompe algunos chipsets Intel)
#param kernelcmdline "selinux=0"         # Desactivar selinux mostrando mensajes
param kernelcmdline "selinux=0 vt.global_cursor_default=0 loglevel=3 udev.log_priority=3 systemd.show_status=false rd.systemd.show_status=false quiet" # Arranque muy silencioso

# Additional modules and settings
param allfirmware    false               # Firmware -> lib.squash via parche fastboot-mangle (ver Proceso-Compilacion §4b). NO poner true: re-infla el initrd y rompe el arranque BIOS.
param blacklist      "snd-pcsp.ko pcspkr.ko"
#param earlymicrocode true

#!!Advanced
param downloads      /downloads          # No tocar salvo problemas de descarga
#param bootprefix    "test/"             # Prefijo en /boot para arranque PXE (incompatible con grub no-red)
