#grub.cfg for ThinStation
#Ruta en fedora: /root/thinstation-ng/ts/build/boot-images/templates/grub/default/grub.cfg
set default="0"
set timeout=2
set timeout_style=progress

insmod progress
#loadfont unicode
#set gfxmode=3840x2160,2880x1800,2560x1600,2560x1440,1920x1200,1920x1080,1680x1050,1600x900,1440x900,1400x1050,1366x768>
#terminal_output gfxterm

# Try to read the machine-id file
set machine_id_file="/boot/machine-id"
if [ -f $machine_id_file ]; then
        source $machine_id_file
else
        # Fallback to a default machine-id
        set machine_id="10000000000000000000000000000001"
fi

#Entrada original
#menuentry 'ThinStation' --class thinstation --class gnu-linux --class gnu --class os --unrestricted {
#        set enable_progress_indicator=1
#        linux /boot/vmlinuz $KERNEL_PARAMETERS boot_device=$root machine_id=$machine_id
#        initrd /boot/initrd
#}

menuentry 'ThinStation' --class thinstation --class gnu-linux --class gnu --class os --unrestricted {
	set enable_progress_indicator=1
	set bootdev="$root"
	if [ "$grub_platform" = "pc" ]; then
		# BIOS local: el nombre de dispositivo de GRUB ($root) NO mapea de
		# forma fiable a Linux al arrancar el ISO hibrido desde USB (puede
		# salir hd0, fd0, etc.). El antiguo regexp "^hd" no cubria fd0 -> el
		# kernel recibia boot_device=fd0, que fastboot no reconoce ("UNKNOWN")
		# y nunca monta lib.squash (cae a initramfs pelado, sin modulos/red).
		# Forzamos cd0 SIEMPRE en BIOS: dispara la rama iso() de fastboot, que
		# localiza el medio por LABEL=$CDVOLNAME (agnostico al dispositivo) y
		# monta el USB real (p.ej. /dev/sdc). Verificado MSI fisico 2026-06-05.
		set bootdev="cd0"
	fi
	linux /boot/vmlinuz $KERNEL_PARAMETERS boot_device=$bootdev machine_id=$machine_id
	initrd /boot/initrd
}