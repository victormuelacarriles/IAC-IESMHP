# ===========================================================================
# Rol DockerRootless — instala Docker en modo ROOTLESS para el usuario actual
# ---------------------------------------------------------------------------
# Sigue la guía oficial: https://docs.docker.com/engine/security/rootless/
#
# El rol corre COMO EL USUARIO (el playbook usa become: no). Solo las tareas
# que tocan el sistema (repos, paquetes, daemon de sistema, lingering) usan
# become: yes puntualmente.
#
# tags: docker, rootless
# ===========================================================================
- name: Etiquetas del rol
  ansible.builtin.debug:
    msg: "Instalando Docker rootless para el usuario '{{ dr_user }}' (uid {{ dr_user_uid }})"
  tags: [docker, rootless]

# ---------------------------------------------------------------------------
# 0. No tiene sentido ejecutarlo como root
# ---------------------------------------------------------------------------
- name: No ejecutar este rol como root
  ansible.builtin.fail:
    msg: >-
      DockerRootless configura el Docker rootless del USUARIO actual.
      No lo lances como root ni con 'become: yes' global; ejecútalo como
      el usuario (ver cabecera de rolesUsuario.yaml).
  when: dr_user_uid | int == 0
  tags: [docker, rootless]

# ---------------------------------------------------------------------------
# 1. Repositorio oficial de Docker  (requiere root)
# ---------------------------------------------------------------------------
- name: Paquetes para configurar el repositorio de Docker
  become: yes
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: false
  tags: [docker, rootless]

- name: Crear directorio de keyrings de APT
  become: yes
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags: [docker, rootless]

- name: Descargar la clave GPG de Docker
  become: yes
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  tags: [docker, rootless]

- name: Añadir el repositorio APT de Docker
  become: yes
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dr_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ dr_codename }} stable
    filename: docker
    state: present
    update_cache: yes
  tags: [docker, rootless]

# ---------------------------------------------------------------------------
# 2. Instalar el stack Docker + prerrequisitos de rootless  (requiere root)
# ---------------------------------------------------------------------------
- name: Instalar Docker y prerrequisitos de rootless
  become: yes
  ansible.builtin.apt:
    name: "{{ dr_docker_packages + dr_prereqs }}"
    state: present
    update_cache: false
  tags: [docker, rootless]

# ---------------------------------------------------------------------------
# 3. Desactivar el daemon de Docker de SISTEMA (recomendado)
# ---------------------------------------------------------------------------
- name: Desactivar el daemon de Docker de sistema
  become: yes
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: no
    state: stopped
  loop:
    - docker.service
    - docker.socket
  failed_when: false
  when: dr_disable_system_docker | bool
  tags: [docker, rootless]

# ---------------------------------------------------------------------------
# 4. subordinate UIDs/GIDs (los necesita el remapeo de rootless)
# ---------------------------------------------------------------------------
- name: Comprobar si el usuario ya tiene subuid asignados
  become: yes
  ansible.builtin.command: "grep -q '^{{ dr_user }}:' /etc/subuid"
  register: dr_subuid
  changed_when: false
  failed_when: false
  tags: [docker, rootless]

- name: Asignar subuid/subgid al usuario si faltan
  become: yes
  ansible.builtin.command: >-
    usermod
    --add-subuids {{ dr_subid_range }}
    --add-subgids {{ dr_subid_range }}
    {{ dr_user }}
  when: dr_subuid.rc != 0
  tags: [docker, rootless]

# ---------------------------------------------------------------------------
# 5. Lingering: que el daemon de usuario arranque en el boot (sin login)
# ---------------------------------------------------------------------------
- name: Habilitar lingering del usuario
  become: yes
  ansible.builtin.command: "loginctl enable-linger {{ dr_user }}"
  args:
    creates: "/var/lib/systemd/linger/{{ dr_user }}"
  tags: [docker, rootless]

# ---------------------------------------------------------------------------
# 6. Instalar el daemon rootless (COMO EL USUARIO)
# ---------------------------------------------------------------------------
- name: ¿Existe ya la unit docker.service del usuario?
  ansible.builtin.stat:
    path: "{{ dr_user_home }}/.config/systemd/user/docker.service"
  register: dr_user_unit
  tags: [docker, rootless]

- name: Instalar Docker rootless (dockerd-rootless-setuptool.sh install)
  ansible.builtin.command: dockerd-rootless-setuptool.sh install
  environment:
    PATH: "/usr/bin:/sbin:/usr/sbin:{{ ansible_env.PATH }}"
    XDG_RUNTIME_DIR: "/run/user/{{ dr_user_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ dr_user_uid }}/bus"
  when: not dr_user_unit.stat.exists
  tags: [docker, rootless]

# ---------------------------------------------------------------------------
# 7. Variables de entorno en ~/.bashrc  (COMO EL USUARIO)
# ---------------------------------------------------------------------------
- name: Exportar DOCKER_HOST y PATH en ~/.bashrc
  ansible.builtin.blockinfile:
    path: "{{ dr_user_home }}/.bashrc"
    create: yes
    marker: "# {mark} IAC-IESMHP DockerRootless"
    block: |
      # Cliente docker apunta al daemon rootless del usuario
      export PATH=/usr/bin:$PATH
      export DOCKER_HOST=unix:///run/user/{{ dr_user_uid }}/docker.sock
  tags: [docker, rootless]

# ---------------------------------------------------------------------------
# 8. Habilitar y arrancar el servicio de usuario
# ---------------------------------------------------------------------------
- name: Habilitar y arrancar docker.service (usuario)
  ansible.builtin.systemd_service:
    name: docker.service
    scope: user
    enabled: yes
    state: started
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ dr_user_uid }}"
    DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ dr_user_uid }}/bus"
  tags: [docker, rootless]

# ---------------------------------------------------------------------------
# 9. Comprobación
# ---------------------------------------------------------------------------
- name: Verificar el daemon rootless (docker info)
  ansible.builtin.command: docker info
  environment:
    PATH: "/usr/bin:/sbin:/usr/sbin:{{ ansible_env.PATH }}"
    DOCKER_HOST: "unix:///run/user/{{ dr_user_uid }}/docker.sock"
  register: dr_info
  changed_when: false
  failed_when: false
  tags: [docker, rootless]

- name: Resultado de la comprobación
  ansible.builtin.debug:
    msg: >-
      {{ 'Docker rootless OK (daemon respondiendo en /run/user/'
         ~ dr_user_uid ~ '/docker.sock)'
         if dr_info.rc == 0
         else 'AVISO: docker info falló (rc=' ~ dr_info.rc ~ '). Revisa la
         sesión systemd de usuario; suele resolverse tras reiniciar la
         sesión del usuario.' }}
  tags: [docker, rootless]
