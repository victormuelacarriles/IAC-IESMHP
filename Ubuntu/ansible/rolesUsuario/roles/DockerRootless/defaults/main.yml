# Variables del rol DockerRootless
# ---------------------------------------------------------------------------

# Usuario / home / uid: se toman del usuario que EJECUTA el playbook.
# (rolesUsuario.yaml corre con become: no, así que estos facts son los suyos.)
dr_user:      "{{ ansible_user_id }}"
dr_user_uid:  "{{ ansible_user_uid }}"
dr_user_home: "{{ ansible_user_dir }}"

# Repositorio oficial de Docker (download.docker.com).
dr_arch: amd64

# Codename del repo APT de Docker. Por defecto se autodetecta el de la
# distribución. Ubuntu 26.04 "resolute" es muy reciente y puede que Docker
# AÚN no publique ese codename; en ese caso, sobreescribe en la invocación
# con uno LTS compatible, p. ej.:  -e dr_codename=noble
dr_codename: "{{ ansible_distribution_release }}"

# Paquetes del stack Docker (desde el repo oficial).
dr_docker_packages:
  - docker-ce                  # binario dockerd (se usa el wrapper rootless)
  - docker-ce-cli              # cliente `docker`
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin      # `docker compose`
  - docker-ce-rootless-extras  # dockerd-rootless-setuptool.sh, rootlesskit

# Prerrequisitos de rootless (mapeo de UIDs, bus de usuario, red, overlay).
dr_prereqs:
  - uidmap                     # newuidmap / newgidmap
  - dbus-user-session          # necesario para `systemctl --user`
  - slirp4netns                # red en espacio de usuario
  - fuse-overlayfs             # driver de almacenamiento overlay sin root

# Rango de subordinate UIDs/GIDs a asignar si el usuario no tuviera (65536).
dr_subid_range: "100000-165535"

# Desactivar el daemon de Docker de SISTEMA (recomendado por la doc oficial
# para evitar conflictos con el rootless). Ponlo a false si compartes el
# equipo con un Docker de sistema intencionado.
dr_disable_system_docker: true
