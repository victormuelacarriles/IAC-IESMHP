- name: Comprobar si hay una GPU NVIDIA
  command: lspci
  changed_when: false  # no quiero que marque como cambiado haya o no haya GPU
  register: lspci_output

- name: Verificar si existe una GPU NVIDIA
  set_fact:
    has_nvidia: "{{ lspci_output.stdout is search('NVIDIA') }}"

- name: Notificar si no hay GPU NVIDIA
  debug:
    msg: "No se detectó una tarjeta NVIDIA en este sistema. Saltando la instalación del driver."
  when: not has_nvidia

# ORIGINALMENTE se paraba el playbook si no había GPU NVIDIA, pero se ha
# comentado para permitir continuar con otras tareas.
#   - name: Salir si no hay GPU NVIDIA
#     meta: end_play
#     when: not has_nvidia

- name: Tareas de instalación de NVIDIA (Ubuntu Desktop 26.04 — soporte nativo)
  when: has_nvidia
  # En maquinas FISICAS con GPU NVIDIA, el postinst del driver (DKMS /
  # shim-signed / enrolado de clave MOK de Secure Boot) abre un dialogo
  # debconf INTERACTIVO. `command: ubuntu-drivers install` es un comando crudo
  # (el modulo `apt` de Ansible ya forzaria noninteractive, un `command` no) y
  # Ansible corre SIN TTY -> ese dialogo espera una entrada que nunca llega y
  # deja dpkg a medio configurar. Sintoma: el primer arranque se cuelga en el
  # rol nvidia y `sudo dpkg --configure -a` lo desbloquea. En VM el rol es casi
  # un no-op (no hay GPU NVIDIA), por eso solo falla en hardware real.
  # DEBIAN_FRONTEND=noninteractive evita el prompt (shim-signed bajo
  # noninteractive NO pide MOK: omite el enrolado); NEEDRESTART_MODE=a evita el
  # whiptail de needrestart tras compilar el modulo.
  environment:
    DEBIAN_FRONTEND: noninteractive
    NEEDRESTART_MODE: a
  block:
    # Si un paso previo (p. ej. apt-get full-upgrade de 3-SetupPrimerInicio.sh)
    # dejo paquetes desempaquetados pero sin configurar, terminarlos ahora para
    # que `ubuntu-drivers install` no parta de un dpkg roto. Best-effort: no
    # aborta el playbook si dpkg no puede terminar (lo reportara el install).
    - name: Asegurar que dpkg no quedó a medio configurar de pasos previos
      command: dpkg --configure --pending
      register: dpkg_pending
      changed_when: false
      failed_when: false

    # Ubuntu 26.04 trae soporte nativo de drivers NVIDIA: el metapaquete
    # ubuntu-drivers-common selecciona el driver recomendado para esta GPU.
    - name: Instalar ubuntu-drivers-common (gestor nativo de drivers de Ubuntu)
      apt:
        name: ubuntu-drivers-common
        state: present
        update_cache: no

    - name: Comprobar si el driver NVIDIA ya está operativo
      command: nvidia-smi --query-gpu=driver_version --format=csv,noheader
      register: nvidia_smi_pre
      changed_when: false
      failed_when: false

    - name: Instalar el driver NVIDIA recomendado por Ubuntu (soporte nativo)
      command: ubuntu-drivers install
      register: ubuntu_drivers_install
      when:
        - nvidia_smi_pre.rc != 0
        - required_nvidia_driver | length == 0

    - name: Instalar una serie concreta del driver NVIDIA (solo si se ha forzado)
      apt:
        name: "nvidia-driver-{{ required_nvidia_driver }}"
        state: present
        update_cache: no
      register: nvidia_driver_pin
      when:
        - nvidia_smi_pre.rc != 0
        - required_nvidia_driver | length > 0

    - name: Reiniciar si se acaba de instalar el driver NVIDIA
      reboot:
        msg: "Reiniciando para aplicar los cambios del driver NVIDIA"
        connect_timeout: 5
        reboot_timeout: 600
        post_reboot_delay: 30
      when: >
        (ubuntu_drivers_install is defined and ubuntu_drivers_install is changed)
        or (nvidia_driver_pin is defined and nvidia_driver_pin is changed)

    - name: Comprobar versión instalada del driver NVIDIA
      command: nvidia-smi --query-gpu=driver_version --format=csv,noheader
      register: nvidia_version
      changed_when: false
      failed_when: false

    - name: Mostrar versión del driver NVIDIA instalada
      debug:
        msg: >
          {% if nvidia_version.rc == 0 %}
            Versión instalada del driver NVIDIA: {{ nvidia_version.stdout }}
          {% else %}
            nvidia-smi no responde todavía; el driver puede requerir otro reinicio.
          {% endif %}

    - name: Obtener el driver recomendado por Ubuntu para esta GPU
      shell: ubuntu-drivers devices 2>/dev/null | awk '/recommended/ {print $3}'
      register: recommended_driver
      changed_when: false
      failed_when: false

    - name: Comparar el driver recomendado con el instalado
      debug:
        msg: >
          {% if recommended_driver.stdout | trim | length > 0 %}
            Driver recomendado por Ubuntu para esta GPU: {{ recommended_driver.stdout | trim }}
            (instalado: {{ nvidia_version.stdout | default('desconocido') }}).
            Si difiere, ejecuta «ubuntu-drivers install» o fija required_nvidia_driver.
          {% else %}
            Ubuntu no reporta un driver recomendado adicional; instalado: {{ nvidia_version.stdout | default('desconocido') }}.
          {% endif %}
