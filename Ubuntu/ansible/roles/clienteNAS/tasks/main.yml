---
# Rol clienteNAS: monta por NFS (solo lectura) TODOS los recursos que el
# NAS del departamento ({{ nas_server_ip }}) publica, autodescubiertos con
# `showmount -e`. Cada export se monta en {{ nas_base_mount }}/<nombre>.
# Parametrizado en defaults/main.yml.

- name: Instalar cliente NFS (provee mount.nfs y showmount)
  apt:
    name:
      - nfs-common
    state: present
    update_cache: false

- name: Crear carpeta base de montaje
  file:
    path: "{{ nas_base_mount }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Autodescubrir los exports del NAS ({{ nas_server_ip }})
  command: "showmount -e {{ nas_server_ip }}"
  register: showmount_raw
  changed_when: false
  retries: "{{ nas_showmount_retries }}"
  delay: "{{ nas_showmount_delay }}"
  until: showmount_raw.rc == 0

# Salida típica:
#   Export list for 10.0.1.100:
#   /mnt/DiscosRapidos/PruebaRapidosX3 *
# La 1ª columna de cada línea es la ruta exportada; el resto es la lista de
# clientes. Nos quedamos solo con las líneas que empiezan por '/', lo que
# descarta la cabecera "Export list for ..." sin depender de --no-headers.
- name: Calcular la lista de exports remotos
  set_fact:
    nas_exports: >-
      {{ showmount_raw.stdout_lines
         | map('regex_replace', '^\s*(\S+).*$', '\1')
         | select('match', '^/')
         | list }}

- name: Avisar si el NAS no publica ningún export
  debug:
    msg: "El NAS {{ nas_server_ip }} no exporta ningún recurso — nada que montar."
  when: nas_exports | length == 0

# Mapa export remoto -> punto de montaje local, según nas_subdir_strategy.
- name: Construir el mapa export remoto -> montaje local
  set_fact:
    nas_mounts: >-
      {{ nas_mounts | default([]) + [ {
           'src': nas_server_ip ~ ':' ~ item,
           'path': nas_base_mount ~ '/' ~ (
                     (item | basename) if nas_subdir_strategy == 'basename'
                     else (item | regex_replace('^/', ''))
                   )
         } ] }}
  loop: "{{ nas_exports }}"
  loop_control:
    label: "{{ item }}"

- name: Mostrar lo que se va a montar
  debug:
    var: nas_mounts
  when: nas_mounts | default([]) | length > 0

- name: Crear los puntos de montaje locales
  file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop: "{{ nas_mounts | default([]) }}"
  loop_control:
    label: "{{ item.path }}"

- name: Montar cada export del NAS (entrada en /etc/fstab + montaje)
  mount:
    path: "{{ item.path }}"
    src: "{{ item.src }}"
    fstype: "{{ nas_fstype }}"
    opts: "{{ nas_mount_options }}"
    state: mounted
  loop: "{{ nas_mounts | default([]) }}"
  loop_control:
    label: "{{ item.src }} -> {{ item.path }}"
