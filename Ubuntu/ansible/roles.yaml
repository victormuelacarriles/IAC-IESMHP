- hosts: all
  become: yes

  pre_tasks:
    - name: Actualizar cache apt (para no hacerlo en cada rol)
      apt:
        update_cache: yes
  roles:
     - basicos       #cosas que debieras estar desde el livecd pero que recomprobamos #[python, pip, pipx, ansible] 
