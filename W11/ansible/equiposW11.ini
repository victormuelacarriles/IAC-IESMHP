# Inventario de equipos Windows 11 — IES Miguel Herrero (Torrelavega)
#
# La conexion es por SSH al servidor OpenSSH de Windows, con PowerShell como
# shell por defecto. El servidor OpenSSH se instala UNA SOLA VEZ a mano (ya no
# es un rol): ver W11/Utiles/Openssh/ProcedimientoOpenss.txt. La autenticacion
# es por clave publica: la clave del equipo de control debe estar (a mano) en
# %ProgramData%\ssh\administrators_authorized_keys del equipo Windows.

[W11]
W11-PRUEBA ansible_host=10.0.72.59
W11-PRUEBA2 ansible_host=10.0.72.60

# Aula IABD (3er octeto .72) — descomentar y completar:
# [IABD]
# IABD-W-00 ansible_host=10.0.72.120
# IABD-W-01 ansible_host=10.0.72.121

# Aula SMRD (3er octeto .32) — descomentar y completar:
# [SMRD]
# SMRD-W-00 ansible_host=10.0.32.120
# SMRD-W-01 ansible_host=10.0.32.121

[all:vars]
ansible_connection=ssh
ansible_shell_type=powershell
ansible_user=usuario
ansible_port=22
ansible_ssh_common_args=-o StrictHostKeyChecking=no
# Clave privada cuya publica esta en Autorizados.txt:
# ansible_ssh_private_key_file=~/.ssh/id_ed25519
