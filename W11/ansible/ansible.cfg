[defaults]
inventory = ./equiposW11.ini
roles_path = ./roles
host_key_checking = False
retry_files_enabled = False
# Salida YAML legible. El antiguo callback community.general.yaml se eliminó en
# community.general 12.0.0; ahora se consigue con el callback de serie + result_format.
stdout_callback = default
result_format = yaml
force_color = True
# Las colecciones necesarias se instalan con:
#   ansible-galaxy collection install -r requirements.yml

[ssh_connection]
# Conexión a Windows por SSH (el shell por defecto del servidor es PowerShell).
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
