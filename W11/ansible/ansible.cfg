[defaults]
inventory = ./equiposW11.ini
roles_path = ./roles
host_key_checking = False
retry_files_enabled = False
# Salida YAML legible. El antiguo callback community.general.yaml se eliminó en
# community.general 12.0.0; ahora se consigue con el callback de serie + result_format.
stdout_callback = default
result_format = yaml
force_color = True
# Medir el tiempo de la instalacion. Callbacks "agregados" que imprimen un resumen
# al final de la ejecucion (no cambian el playbook ni los roles):
#   timer                       -> tiempo TOTAL del playbook (linea legible al final).
#   ansible.posix.profile_roles -> desglose de tiempo POR rol (cual es el mas lento).
#   ansible.posix.profile_tasks -> tiempo de CADA tarea + las mas lentas al final.
# profile_roles/profile_tasks requieren la coleccion ansible.posix (requirements.yml).
callbacks_enabled = timer, ansible.posix.profile_roles, ansible.posix.profile_tasks
# Las colecciones necesarias se instalan con:
#   ansible-galaxy collection install -r requirements.yml

[ssh_connection]
# Conexión a Windows por SSH (el shell por defecto del servidor es PowerShell).
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
