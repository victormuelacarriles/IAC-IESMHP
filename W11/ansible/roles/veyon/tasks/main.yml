---
# Rol veyon — Veyon, gestion/monitorizacion de aula (https://veyon.io) via Chocolatey.
- name: Instalar Veyon {{ veyon_version | default('(ultima)', true) }}
  chocolatey.chocolatey.win_chocolatey:
    name: "{{ veyon_choco_name }}"
    version: "{{ veyon_version | default(omit, true) }}"
    state: present
