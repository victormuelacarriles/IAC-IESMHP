---
# Rol openssh — Servidor OpenSSH + PowerShell como shell + claves de admin.
# Reproduce de forma idempotente el procedimiento manual de
# W11/Utiles/Openssh/ProcedimientoOpenss.txt (asi el propio Ansible mantiene
# las claves al dia en cada pasada).

- name: Instalar las capacidades OpenSSH (cliente y servidor)
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    foreach ($cap in 'OpenSSH.Client~~~~0.0.1.0','OpenSSH.Server~~~~0.0.1.0') {
      if ((Get-WindowsCapability -Online -Name $cap).State -ne 'Installed') {
        Add-WindowsCapability -Online -Name $cap | Out-Null
        Write-Output "INSTALADO $cap"
      }
    }
  register: openssh_caps
  changed_when: "'INSTALADO' in openssh_caps.stdout"

- name: Servicio sshd automatico y arrancado
  ansible.windows.win_service:
    name: sshd
    start_mode: auto
    state: started

- name: Servicio ssh-agent automatico
  ansible.windows.win_service:
    name: ssh-agent
    start_mode: auto
    state: started
  ignore_errors: true

- name: Regla de firewall para sshd (TCP 22 entrante)
  community.windows.win_firewall_rule:
    name: OpenSSH-Server-In-TCP
    displayname: OpenSSH Server (sshd)
    localport: 22
    action: allow
    direction: in
    protocol: tcp
    enabled: yes
    state: present

- name: PowerShell como shell por defecto de SSH
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\OpenSSH
    name: DefaultShell
    data: C:\Windows\System32\WindowsPowerShell\v1.0\powershell.exe
    type: string

- name: Volcar claves autorizadas de administrador desde el repo
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    $url = '{{ openssh_autorizados_url }}'
    $sshDir = "$env:ProgramData\ssh"
    $authFile = "$sshDir\administrators_authorized_keys"
    if (-not (Test-Path $sshDir)) { New-Item -ItemType Directory -Force -Path $sshDir | Out-Null }
    $nuevas = (Invoke-RestMethod -Uri $url) -split '\r?\n' | Where-Object { $_.Trim() -ne '' }
    $exist = @()
    if (Test-Path $authFile) { $exist = Get-Content $authFile | Where-Object { $_.Trim() -ne '' } }
    $add = 0
    foreach ($c in $nuevas) {
      $c = $c.Trim()
      if ($exist -notcontains $c) { Add-Content -Path $authFile -Value $c; $exist += $c; $add++ }
    }
    # Permisos exigidos por sshd para administrators_authorized_keys:
    # solo Administradores y SYSTEM, sin herencia (si no, sshd ignora el fichero).
    icacls $authFile /inheritance:r /grant 'Administrators:F' 'SYSTEM:F' | Out-Null
    Write-Output "ADDED=$add"
  register: ssh_keys
  changed_when: "'ADDED=0' not in ssh_keys.stdout"
