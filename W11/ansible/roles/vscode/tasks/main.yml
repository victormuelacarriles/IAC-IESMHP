---
# Rol vscode — Visual Studio Code via Chocolatey.
- name: Instalar Visual Studio Code {{ vscode_version | default('(ultima)', true) }}
  chocolatey.chocolatey.win_chocolatey:
    name: vscode
    version: "{{ vscode_version | default(omit, true) }}"
    state: present
    package_params: "/NoDesktopIcon"
