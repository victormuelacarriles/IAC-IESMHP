---
# Rol escritorioRemoto — habilita el Escritorio Remoto (RDP) de Windows.
# No es un paquete: es configuracion de registro + firewall.

- name: Permitir conexiones RDP (fDenyTSConnections=0)
  ansible.windows.win_regedit:
    path: HKLM:\System\CurrentControlSet\Control\Terminal Server
    name: fDenyTSConnections
    data: 0
    type: dword

- name: Exigir autenticacion a nivel de red (NLA)
  ansible.windows.win_regedit:
    path: HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp
    name: UserAuthentication
    data: "{{ rdp_nla }}"
    type: dword

- name: Abrir el grupo de reglas de firewall de Escritorio Remoto
  # Se usa el id de grupo (independiente del idioma de Windows) en vez del
  # nombre localizado "Escritorio remoto" / "Remote Desktop".
  ansible.windows.win_shell: Enable-NetFirewallRule -Group '@FirewallAPI.dll,-28752'
  changed_when: false
